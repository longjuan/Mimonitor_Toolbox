name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build MonitorTool.jar
        run: make jar

      - name: Upload MonitorTool.jar
        uses: actions/upload-artifact@v4
        with:
          name: MonitorTool-jar
          path: mimonitor/resources/MonitorTool.jar

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: mimonitor
        run: npm ci

      - name: Rust check
        working-directory: mimonitor/src-tauri
        run: cargo check

      - name: TypeScript check
        working-directory: mimonitor
        run: npx tsc --noEmit

      - name: Rust clippy
        working-directory: mimonitor/src-tauri
        run: cargo clippy -- -D warnings || true

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, build-jar]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" mimonitor/src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" mimonitor/src-tauri/Cargo.toml
          rm -f mimonitor/src-tauri/tauri.conf.json.bak mimonitor/src-tauri/Cargo.toml.bak

      - name: Download MonitorTool.jar
        uses: actions/download-artifact@v4
        with:
          name: MonitorTool-jar
          path: mimonitor/resources/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: mimonitor
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mimonitor
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  build-universal:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-jar]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" mimonitor/src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" mimonitor/src-tauri/Cargo.toml
          rm -f mimonitor/src-tauri/tauri.conf.json.bak mimonitor/src-tauri/Cargo.toml.bak

      - name: Download MonitorTool.jar
        uses: actions/download-artifact@v4
        with:
          name: MonitorTool-jar
          path: mimonitor/resources/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: mimonitor
        run: npm ci

      - name: Build universal macOS app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mimonitor
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
