name: Build Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Validate source
        run: python -m py_compile monitor_controller.py

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build exe
        run: python -m PyInstaller --clean --noconfirm MonitorToolbox.spec

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MonitorToolbox.exe
          generate_release_notes: true
